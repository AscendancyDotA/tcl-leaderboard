name: Notify Discord on Data Update

on:
  push:
    branches:
      - main
    paths:
      - 'docs/data/leaderboard.json'

jobs:
  discord-notify:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Send Discord Update
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python scripts/discord_webhook.py
